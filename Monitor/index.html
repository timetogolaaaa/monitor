<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鱼缸水质监控</title>
<style>
  body{font-family:Arial;padding:20px;max-width:400px;margin:0 auto;}
  .card{border:1px solid #ccc;padding:15px;border-radius:12px;margin:10px 0;}
  .value{font-size:26px;font-weight:bold;margin:5px 0;}
  .good{background:#e6f7e6;color:#060;}
  .bad{background:#ffe6e6;color:#900;}
  .suggest{padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>
<h1>鱼缸实时监控</h1>

<div class="card">
  <div>PH 值：<span id="ph" class="value">--</span></div>
  <div>温度：<span id="temp" class="value">--</span> ℃</div>
</div>

<div>
  选择鱼类：
  <select id="fishType">
    <option value="goldfish">金鱼</option>
    <option value="peacock">孔雀鱼</option>
    <option value="betta">斗鱼</option>
    <option value="tetra">灯科鱼</option>
  </select>
</div>

<div id="suggest" class="suggest"></div>

<script>
let data = { ph: null, temp: null };

// 获取数据
async function fetchData() {
  try {
    const res = await fetch("/api/data");
    data = await res.json();
    document.getElementById("ph").innerText = data.ph?.toFixed(2) || "--";
    document.getElementById("temp").innerText = data.temp?.toFixed(1) || "--";
    check();
  } catch (e) {}
}

// 判断水质 + 温度
function check() {
  const { ph, temp } = data;
  const type = document.getElementById("fishType").value;
  const s = document.getElementById("suggest");

  const rule = {
    goldfish: { phMin:7.0, phMax:8.0, tMin:18, tMax:24, name:"金鱼" },
    peacock: { phMin:6.8, phMax:7.8, tMin:22, tMax:28, name:"孔雀鱼" },
    betta: { phMin:6.0, phMax:7.0, tMin:24, tMax:30, name:"斗鱼" },
    tetra: { phMin:5.5, phMax:7.0, tMin:22, tMax:26, name:"灯科鱼" }
  };

  const r = rule[type];
  let msg = [];
  let isBad = false;

  if (ph < r.phMin) { msg.push("PH偏低，加珊瑚骨/少量换水"); isBad=true; }
  else if (ph > r.phMax) { msg.push("PH偏高，加榄仁叶/缓慢换水"); isBad=true; }

  if (temp < r.tMin) { msg.push("温度偏低，需要加温"); isBad=true; }
  else if (temp > r.tMax) { msg.push("温度偏高，需要降温"); isBad=true; }

  if (!isBad) {
    s.className = "suggest good";
    s.innerText = `${r.name}：水质一切正常！`;
  } else {
    s.className = "suggest bad";
    s.innerText = `${r.name}：` + msg.join("，");
  }
}

setInterval(fetchData, 5000);
document.getElementById("fishType").onchange = check;
fetchData();
</script>
</body>
</html>
